<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرئيسية - مزود الخدمة</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>مزود الخدمة</h1>
        <div class="balance">رصيدك: <span id="balance">0</span> $</div>
        <button id="logout">تسجيل خروج</button>
    </header>
    <main>
        <h2>اختر نوع الاشتراك</h2>
        <div class="services-grid">
            <a href="satellite.html" class="service-card">الأقمار الصناعية</a>
            <a href="fiber.html" class="service-card">الألياف المحلية</a>
            <a href="app.html" class="service-card">تطبيق</a>
            <a href="esim.html" class="service-card">شريحة إلكترونية</a>
            <a href="sim.html" class="service-card">شريحة</a>
        </div>
    </main>
    <script type="module" src="js/firebase-init.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-init.js';
        import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // التحقق من حالة تسجيل الدخول
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            // جلب الرصيد من Firestore
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
                document.getElementById('balance').textContent = userDoc.data().balance || 0;
            }
        });

        // تسجيل الخروج
        document.getElementById('logout').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
