<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة سيارات واقعية - 4K</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-size: 16px;
            z-index: 100;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loading">🚗 جاري تحميل عالم السيارات...</div>
    <div id="info">🏎️ لعبة سيارات واقعية - جودة 4K</div>
    <div id="controls">🕹️ WASD للقيادة | C لتبديل الكاميرا | F لملء الشاشة | Space فرملة يدوية</div>

    <!-- استيراد المكتبات -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Sky } from 'three/addons/objects/Sky.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- إعداد المشهد والرندر بدقة عالية ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaccff);
        scene.fog = new THREE.FogExp2(0xaaccff, 0.001); // ضباب خفيف

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", precision: "highp" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // دقة عالية
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.shadowMap.bias = 0.0001;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- إخفاء شاشة التحميل بعد ثانيتين ---
        setTimeout(() => document.getElementById('loading').style.display = 'none', 2000);

        // --- الكاميرات ---
        const cameraFollow = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        cameraFollow.position.set(0, 3, -8); // خلف السيارة

        const cameraFree = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        cameraFree.position.set(20, 10, 30);

        let activeCamera = cameraFollow;
        const controls = new OrbitControls(cameraFree, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.enabled = false; // نبدأ بكاميرا التتبع

        // --- الإضاءة المحيطة (Hemisphere) ---
        const hemiLight = new THREE.HemisphereLight(0x88ccff, 0x335511, 1.2);
        scene.add(hemiLight);

        // --- إضاءة شمسية مع ظلال عالية الدقة ---
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        sunLight.position.set(50, 60, 30);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 4096;
        sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 200;
        sunLight.shadow.camera.left = -50;
        sunLight.shadow.camera.right = 50;
        sunLight.shadow.camera.top = 50;
        sunLight.shadow.camera.bottom = -50;
        sunLight.shadow.bias = -0.0005;
        sunLight.shadow.normalBias = 0.02;
        scene.add(sunLight);

        // --- إضاءة خلفية دافئة ---
        const backLight = new THREE.DirectionalLight(0xffaa66, 0.5);
        backLight.position.set(-30, 20, -40);
        scene.add(backLight);

        // --- سماء ديناميكية (Sky) ---
        const sky = new Sky();
        sky.scale.setScalar(450);
        scene.add(sky);

        const skyUniforms = sky.material.uniforms;
        skyUniforms['turbidity'].value = 8;
        skyUniforms['rayleigh'].value = 1.5;
        skyUniforms['mieCoefficient'].value = 0.005;
        skyUniforms['mieDirectionalG'].value = 0.8;
        skyUniforms['sunPosition'].value.copy(sunLight.position);

        // --- أرضية واسعة مع نسيج عالي الجودة ---
        const textureLoader = new THREE.TextureLoader();
        
        // تحميل أنسجة (نستخدم أنسجة من Three.js examples)
        const roadColor = textureLoader.load('https://threejs.org/examples/textures/terrain/grass_01_diff_1k.jpg'); // سنستخدمه مؤقتاً، لكن الأفضل أنسجة طريق
        // لكن سنستخدم لوناً للطريق ونسيجاً للعشب

        // أرضية رئيسية (عشب)
        const groundGeo = new THREE.CircleGeometry(300, 128);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a8c5a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- إنشاء طريق دائري (حلبة سباق) ---
        function createRoad() {
            const roadGroup = new THREE.Group();
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7 });
            const roadWidth = 8;
            
            // حلقة دائرية
            const curve = new THREE.EllipseCurve(0, 0, 40, 40, 0, 2 * Math.PI, false, 0);
            const points = curve.getPoints(100);
            const roadGeo = new THREE.TubeGeometry(
                new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(p.x, 0.01, p.y))),
                100, roadWidth, 8, false
            );
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.receiveShadow = true;
            road.rotation.x = 0;
            roadGroup.add(road);

            // إضافة خطوط جانبية (بيضاء)
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            for (let i = 0; i < points.length; i += 5) {
                const p = points[i];
                const marker = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 1), lineMat);
                marker.position.set(p.x, 0.02, p.y);
                marker.rotation.y = Math.atan2(p.y, p.x); // اتجاه المماس
                roadGroup.add(marker);
            }

            return roadGroup;
        }

        const road = createRoad();
        scene.add(road);

        // --- أشجار واقعية (نوعان) ---
        function createTreePine(x, z) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6b4c3b, roughness: 0.8 });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d6a4f, roughness: 0.4 });

            // جذع
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 5), trunkMat);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            trunk.position.y = 2.5;
            group.add(trunk);

            // أوراق (عدة كرات)
            const leaf1 = new THREE.Mesh(new THREE.ConeGeometry(1.5, 2, 6), leafMat);
            leaf1.castShadow = true;
            leaf1.receiveShadow = true;
            leaf1.position.y = 4.5;
            group.add(leaf1);

            const leaf2 = new THREE.Mesh(new THREE.ConeGeometry(1.2, 1.8, 6), leafMat);
            leaf2.castShadow = true;
            leaf2.receiveShadow = true;
            leaf2.position.y = 6;
            group.add(leaf2);

            group.position.set(x, 0, z);
            return group;
        }

        function createTreeOak(x, z) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x3A7734 });

            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.4, 6), trunkMat);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            trunk.position.y = 3;
            group.add(trunk);

            const leaf = new THREE.Mesh(new THREE.SphereGeometry(2.5, 5), leafMat);
            leaf.castShadow = true;
            leaf.receiveShadow = true;
            leaf.position.y = 6;
            group.add(leaf);

            group.position.set(x, 0, z);
            return group;
        }

        // توزيع الأشجار حول الحلبة
        for (let i = 0; i < 200; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 50 + Math.random() * 100;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            if (i % 2 === 0) scene.add(createTreePine(x, z));
            else scene.add(createTreeOak(x, z));
        }

        // --- عشب كثيف (InstancedMesh) ---
        const bladeGeo = new THREE.ConeGeometry(0.1, 0.4, 4);
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0x4a7a4a });
        const bladeCount = 10000;
        const instancedGrass = new THREE.InstancedMesh(bladeGeo, bladeMat, bladeCount);
        instancedGrass.castShadow = true;
        instancedGrass.receiveShadow = true;

        const dummy = new THREE.Object3D();
        for (let i = 0; i < bladeCount; i++) {
            const radius = 30 + Math.random() * 150;
            const angle = Math.random() * Math.PI * 2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            dummy.position.set(x, 0.2, z);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.set(1, 0.8 + Math.random() * 0.7, 1);
            dummy.updateMatrix();
            instancedGrass.setMatrixAt(i, dummy.matrix);
        }
        instancedGrass.instanceMatrix.needsUpdate = true;
        scene.add(instancedGrass);

        // --- صخور متناثرة ---
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x6a6a6a, roughness: 0.9 });
        for (let i = 0; i < 100; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(0.5 + Math.random() * 1.5);
            const rock = new THREE.Mesh(rockGeo, rockMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 20 + Math.random() * 120;
            rock.position.set(Math.cos(angle) * radius, 0.3, Math.sin(angle) * radius);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }

        // --- إنشاء سيارة مفصلة (باستخدام مكعبات وأسطوانات) ---
        function createCar() {
            const carGroup = new THREE.Group();

            // مواد السيارة
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.3, metalness: 0.7 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.7 });
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.4, metalness: 0.8 });

            // جسم السيارة (صندوق رئيسي)
            const bodyGeo = new THREE.BoxGeometry(2.2, 0.8, 4.5);
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            body.receiveShadow = true;
            body.position.y = 0.6;
            body.position.z = 0;
            carGroup.add(body);

            // الكابينة (السقف)
            const cabinGeo = new THREE.BoxGeometry(1.5, 0.6, 2.0);
            const cabin = new THREE.Mesh(cabinGeo, glassMat);
            cabin.castShadow = true;
            cabin.receiveShadow = true;
            cabin.position.set(0, 1.1, -0.3);
            carGroup.add(cabin);

            // غطاء المحرك
            const hoodGeo = new THREE.BoxGeometry(1.8, 0.3, 1.2);
            const hood = new THREE.Mesh(hoodGeo, bodyMat);
            hood.castShadow = true;
            hood.receiveShadow = true;
            hood.position.set(0, 0.9, 1.2);
            carGroup.add(hood);

            // صندوق خلفي
            const trunkGeo = new THREE.BoxGeometry(1.8, 0.3, 1.2);
            const trunk = new THREE.Mesh(trunkGeo, bodyMat);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            trunk.position.set(0, 0.9, -1.5);
            carGroup.add(trunk);

            // مصابيح أمامية
            const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0x442200 });
            const lightGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2);
            const lightL = new THREE.Mesh(lightGeo, lightMat);
            lightL.castShadow = true;
            lightL.receiveShadow = true;
            lightL.rotation.z = Math.PI/2;
            lightL.position.set(-0.8, 0.5, 2.1);
            carGroup.add(lightL);
            const lightR = lightL.clone();
            lightR.position.set(0.8, 0.5, 2.1);
            carGroup.add(lightR);

            // عجلات
            const wheelPositions = [
                [-1.2, 0.3, 1.2],
                [1.2, 0.3, 1.2],
                [-1.2, 0.3, -1.3],
                [1.2, 0.3, -1.3]
            ];

            wheelPositions.forEach(pos => {
                const wheelGroup = new THREE.Group();
                
                // إطار العجلة (أسطوانة)
                const tireGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 24);
                const tire = new THREE.Mesh(tireGeo, wheelMat);
                tire.castShadow = true;
                tire.receiveShadow = true;
                tire.rotation.z = Math.PI/2;
                wheelGroup.add(tire);

                // الجنط
                const rimGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.41, 8);
                const rim = new THREE.Mesh(rimGeo, rimMat);
                rim.castShadow = true;
                rim.receiveShadow = true;
                rim.rotation.z = Math.PI/2;
                wheelGroup.add(rim);

                wheelGroup.position.set(pos[0], pos[1], pos[2]);
                carGroup.add(wheelGroup);
            });

            return carGroup;
        }

        const car = createCar();
        car.position.set(0, 0.3, 0);
        car.castShadow = true;
        car.receiveShadow = true;
        scene.add(car);

        // --- حالة السيارة (فيزياء بسيطة) ---
        const carState = {
            speed: 0,
            maxSpeed: 0.5,
            acceleration: 0.02,
            turnSpeed: 0.03,
            angle: 0
        };

        const keyState = {
            w: false,
            a: false,
            s: false,
            d: false,
            space: false
        };

        // --- أحداث لوحة المفاتيح ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW' || e.code === 'KeyA' || e.code === 'KeyS' || e.code === 'KeyD' || e.code === 'KeyC' || e.code === 'KeyF' || e.code === 'Space') {
                e.preventDefault();
            }
            switch(e.code) {
                case 'KeyW': keyState.w = true; break;
                case 'KeyA': keyState.a = true; break;
                case 'KeyS': keyState.s = true; break;
                case 'KeyD': keyState.d = true; break;
                case 'Space': keyState.space = true; break;
                case 'KeyC':
                    activeCamera = (activeCamera === cameraFollow) ? cameraFree : cameraFollow;
                    controls.enabled = (activeCamera === cameraFree);
                    break;
                case 'KeyF':
                    if (document.fullscreenElement) document.exitFullscreen();
                    else document.body.requestFullscreen();
                    break;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW' || e.code === 'KeyA' || e.code === 'KeyS' || e.code === 'KeyD' || e.code === 'Space') e.preventDefault();
            switch(e.code) {
                case 'KeyW': keyState.w = false; break;
                case 'KeyA': keyState.a = false; break;
                case 'KeyS': keyState.s = false; break;
                case 'KeyD': keyState.d = false; break;
                case 'Space': keyState.space = false; break;
            }
        });

        // --- حلقة اللعبة (فيزياء السيارة) ---
        const clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();

            // فيزياء السيارة
            if (keyState.w) carState.speed += carState.acceleration;
            if (keyState.s) carState.speed -= carState.acceleration;
            if (keyState.space) carState.speed *= 0.95; // فرملة يدوية

            // حدود السرعة
            carState.speed = Math.max(-carState.maxSpeed/2, Math.min(carState.maxSpeed, carState.speed));

            // التوجيه (إذا كانت السرعة ليست صفراً)
            if (Math.abs(carState.speed) > 0.01) {
                if (keyState.a) carState.angle += carState.turnSpeed * Math.sign(carState.speed);
                if (keyState.d) carState.angle -= carState.turnSpeed * Math.sign(carState.speed);
            }

            // تحديث موقع السيارة
            car.rotation.y = carState.angle;
            car.position.x += Math.sin(carState.angle) * carState.speed;
            car.position.z += Math.cos(carState.angle) * carState.speed;

            // تحديث كاميرا التتبع
            if (activeCamera === cameraFollow) {
                const offset = new THREE.Vector3(
                    Math.sin(carState.angle) * 5,
                    2,
                    Math.cos(carState.angle) * 8
                );
                cameraFollow.position.copy(car.position.clone().add(offset));
                cameraFollow.lookAt(car.position);
            } else {
                controls.update();
            }

            // دوران العجلات (تأثير بصري)
            car.children.forEach(child => {
                if (child.children && child.children.length === 2) { // تحديد العجلات
                    child.children[0].rotation.x += carState.speed * 2; // دوران الإطار
                }
            });

            renderer.render(scene, activeCamera);
            requestAnimationFrame(animate);
        }

        animate();

        // --- تغيير حجم النافذة ---
        window.addEventListener('resize', () => {
            cameraFollow.aspect = window.innerWidth / window.innerHeight;
            cameraFollow.updateProjectionMatrix();
            cameraFree.aspect = window.innerWidth / window.innerHeight;
            cameraFree.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('🚗 لعبة السيارات جاهزة!');
    </script>
</body>
  </html>
