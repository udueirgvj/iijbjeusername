<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عالم الغابة الغامضة</title>
    <style>
        /* تنسيق الخلفية والجسم */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* سنستخدم رابط الصورة التي أرسلتها كخلفية */
            background-image: url('https://r2.erweima.ai/i/6O6y_e7XReWjX_q44i8K0Q.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* حاوية اللعبة (صندوق الحوار) */
        #game-container {
            background: rgba(44, 30, 18, 0.9); /* لون خشبي داكن شفاف */
            border: 4px solid #8b5a2b;
            border-radius: 15px;
            padding: 30px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            text-align: center;
            color: #f1e5ac; /* لون نص ذهبي فاتح */
        }

        h1 { margin-top: 0; color: #ffcc00; text-shadow: 2px 2px #000; }
        p { font-size: 1.2rem; line-height: 1.6; }

        /* تنسيق الأزرار */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(to bottom, #5d4037, #3e2723);
            border: 2px solid #8b5a2b;
            color: white;
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover {
            background: #8b5a2b;
            transform: scale(1.02);
            box-shadow: 0 0 10px #ffcc00;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="location-title">تحميل العالم...</h1>
        <p id="description">يرجى الانتظار...</p>
        <div id="options" class="options-container"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
