<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول أو إنشاء حساب - مزود الخدمة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* أنماط إضافية لصفحة المصادقة */
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            margin: 50px auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f0f0f0;
            border-radius: 50px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #555;
        }

        .tab.active {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .form-group input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <h1 style="text-align: center; margin-bottom: 30px;">
                <i class="fas fa-satellite-dish" style="color: #667eea;"></i> مرحباً بك
            </h1>

            <div class="tabs">
                <button class="tab active" id="loginTab">تسجيل الدخول</button>
                <button class="tab" id="signupTab">إنشاء حساب</button>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <div id="loginFormContainer" class="form-container active">
                <form id="loginForm">
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-sign-in-alt"></i> دخول
                    </button>
                </form>
            </div>

            <!-- نموذج إنشاء حساب -->
            <div id="signupFormContainer" class="form-container">
                <form id="signupForm">
                    <div class="form-group">
                        <input type="email" id="signupEmail" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="signupPassword" placeholder="كلمة المرور" required>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-user-plus"></i> إنشاء حساب
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        // استيراد Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWZf2IbNO2L61TCIgX1ZOw1smwiOX-ykQ",
            authDomain: "support-group-9fb1c.firebaseapp.com",
            projectId: "support-group-9fb1c",
            storageBucket: "support-group-9fb1c.firebasestorage.app",
            messagingSenderId: "951502251740",
            appId: "1:951502251740:web:fd4b8059ee2a07764cf619",
            measurementId: "G-E6PWD6CRJL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // عناصر الصفحة
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginContainer = document.getElementById('loginFormContainer');
        const signupContainer = document.getElementById('signupFormContainer');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        // تبديل التبويبات
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginContainer.classList.add('active');
            signupContainer.classList.remove('active');
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupContainer.classList.add('active');
            loginContainer.classList.remove('active');
        });

        // تسجيل الدخول
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('خطأ في تسجيل الدخول: ' + error.message);
            }
        });

        // إنشاء حساب
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // إضافة المستخدم إلى Firestore برصيد 0
                await setDoc(doc(db, 'users', user.uid), {
                    email: email,
                    balance: 0,
                    createdAt: new Date()
                });

                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('خطأ في إنشاء الحساب: ' + error.message);
            }
        });
    </script>
</body>
</html>
